name: Test TestGoodHamburger

on:
  workflow_dispatch:
  push:
    tags:
      - '**'  
    paths:
      - 'TestGoodHamburger/**'
  pull_request:
    paths:
      - 'TestGoodHamburger/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Test Project
        run: dotnet restore ./TestGoodHamburger/TestGoodHamburger.csproj

      - name: Build Test Project
        run: dotnet build ./TestGoodHamburger/TestGoodHamburger.csproj --configuration Release --no-restore

      - name: Run Tests (TestGoodHamburger)
        run: |
          dotnet test ./TestGoodHamburger/TestGoodHamburger.csproj --configuration Release --no-build --verbosity normal
